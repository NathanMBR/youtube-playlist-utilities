name: Release Workflow
on:
  workflow_run:
    workflows: [Code Quality Workflow]
    types: [completed]
    branches: [master]

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3
      - name: Get app version
        id: get_version
        run: |
          VERSION=$(jq -r '.package.version' src/main/tauri/tauri.conf.json)
          echo "tag_name=v${VERSION}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: 'YouTube Playlist Utilities ${{ steps.get_version.outputs.tag_name }}'
          body: 'See the assets to download this version and install.'
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3
      - name: Setup Environment Variables
        run: echo "VITE_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}" > .env
      - name: Write Docker build script
        run: |
          cat > /tmp/build.sh << 'EOF'
          #!/bin/bash
          set -ex
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y curl ca-certificates build-essential \
            libssl-dev pkg-config \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf

          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install 22

          curl -fsSL https://get.pnpm.io/install.sh | ENV="$HOME/.bashrc" SHELL="$(which bash)" bash -
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
          export PATH="/root/.cargo/bin:$PATH"

          pnpm install
          pnpm tauri build
          EOF
          chmod +x /tmp/build.sh
      - name: Build in Ubuntu 20.04 Docker container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/build.sh:/build.sh" \
            -w /workspace \
            ubuntu:20.04 \
            bash /build.sh
      - name: Fix artifact permissions
        run: sudo chown -R $USER:$USER src/main/tauri/target/
      - name: Upload Linux artifacts to GitHub Release
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            src/main/tauri/target/release/bundle/deb/*.deb \
            src/main/tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: [create-release]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install Frontend Dependencies
        run: pnpm install
      - name: Setup Environment Variables
        run : |
          echo "VITE_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}" > .env
      - name: Run Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-macos:
    needs: [create-release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install Frontend Dependencies
        run: pnpm install
      - name: Setup Environment Variables
        run : |
          echo "VITE_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}" > .env
      - name: Run Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
